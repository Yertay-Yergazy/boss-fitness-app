<!-- @dsCard group="Colors" viewport="700x120" name="Background Surfaces" subtitle="Dark surface hierarchy — base to elevated" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin:0; background:#050505; padding:16px; font-family:'Montserrat',sans-serif; }
    .row { display:flex; gap:8px; }
    .sw { flex:1; height:72px; border-radius:8px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px; border:1px solid rgba(255,255,255,0.06); }
    .label { font-size:9px; font-weight:700; color:#9A9A9A; letter-spacing:0.06em; }
    .val { font-size:8px; color:#555; margin-top:1px; }
  </style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#0A0A0A"><div class="label">bg-base</div><div class="val">#0A0A0A</div></div>
    <div class="sw" style="background:#121212"><div class="label">bg-elevated</div><div class="val">#121212</div></div>
    <div class="sw" style="background:#1A1A1A"><div class="label">bg-surface</div><div class="val">#1A1A1A</div></div>
    <div class="sw" style="background:#222222"><div class="label">bg-surface-2</div><div class="val">#222222</div></div>
    <div class="sw" style="background:#1E1E1E"><div class="label">bg-input</div><div class="val">#1E1E1E</div></div>
  </div>
</body>
</html>
