<!-- @dsCard group="Colors" viewport="700x120" name="Red Accent" subtitle="Error, urgent status, expired state — 4-step scale" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin:0; background:#0A0A0A; padding:16px; font-family:'Montserrat',sans-serif; }
    .row { display:flex; gap:8px; align-items:flex-end; }
    .sw { flex:1; border-radius:8px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px; }
    .label { font-size:9px; font-weight:700; color:white; letter-spacing:0.06em; }
    .val { font-size:8px; color:rgba(255,255,255,0.6); margin-top:1px; }
  </style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#F04040;height:52px"><div class="label">400</div><div class="val">#F04040</div></div>
    <div class="sw" style="background:#E3242B;height:60px;outline:2px solid #F04040;outline-offset:2px"><div class="label">500 ●</div><div class="val">#E3242B</div></div>
    <div class="sw" style="background:#D42020;height:52px"><div class="label">600</div><div class="val">#D42020</div></div>
    <div class="sw" style="background:#C81E1E;height:44px"><div class="label">700</div><div class="val">#C81E1E</div></div>
    <div style="flex:3;padding:12px 16px;background:rgba(227,36,43,0.12);border:1px solid rgba(227,36,43,0.35);border-radius:8px;display:flex;flex-direction:column;gap:6px;">
      <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;color:#E3242B;">ПРИМЕНЕНИЕ</div>
      <div style="font-size:10px;color:#9A9A9A;line-height:1.6">Просроченные абонементы<br>Ошибки и блокеры<br>Критические статусы</div>
    </div>
  </div>
</body>
</html>
