<!-- @dsCard group="Type" viewport="700x180" name="Body & UI Type" subtitle="Montserrat (headings) and Inter (body) in use" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin:0; background:#0A0A0A; padding:20px 24px; }
    .cols { display:grid; grid-template-columns:1fr 1px 1fr; gap:20px; }
    .divider { background:rgba(255,255,255,0.07); }
    .eyebrow { font-family:'Montserrat',sans-serif; font-size:9px; font-weight:700; color:#555; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:10px; }
  </style>
</head>
<body>
  <div class="cols">
    <div>
      <div class="eyebrow">Montserrat — var(--font-heading)</div>
      <div style="font-family:'Montserrat',sans-serif;font-size:20px;font-weight:900;color:white;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:4px">ЗАНЯТИЕ ПОДТВЕРЖДЕНО</div>
      <div style="font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:#C9A227;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px">ВЫБЕРИ СВОЙ КЛЮЧ</div>
      <div style="font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;color:#9A9A9A;letter-spacing:0.12em;text-transform:uppercase">ОСТАЛОСЬ ЗАНЯТИЙ</div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="eyebrow">Inter — var(--font-body)</div>
      <div style="font-family:'Inter',sans-serif;font-size:14px;color:#E8E8E8;line-height:1.6;margin-bottom:6px">Покажи или дай отсканировать<br>QR-код на стойке регистрации.</div>
      <div style="font-family:'Inter',sans-serif;font-size:12px;color:#9A9A9A;line-height:1.6">Ключ закреплён за тобой<br>на время тренировки.</div>
    </div>
  </div>
</body>
</html>
