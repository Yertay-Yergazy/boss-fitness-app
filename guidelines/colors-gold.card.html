<!-- @dsCard group="Colors" viewport="700x120" name="Gold Palette" subtitle="Primary metallic accent — 7-step scale" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin:0; background:#0A0A0A; padding:16px; font-family:'Montserrat',sans-serif; }
    .row { display:flex; gap:8px; }
    .sw { flex:1; height:72px; border-radius:8px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px; }
    .label { font-size:9px; font-weight:700; letter-spacing:0.06em; }
    .val { font-size:8px; opacity:0.7; margin-top:1px; }
  </style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#FFF8DC"><div class="label" style="color:#555">100</div><div class="val" style="color:#555">#FFF8DC</div></div>
    <div class="sw" style="background:#F5D77A"><div class="label" style="color:#333">200</div><div class="val" style="color:#333">#F5D77A</div></div>
    <div class="sw" style="background:#E8C255"><div class="label" style="color:#333">300</div><div class="val" style="color:#333">#E8C255</div></div>
    <div class="sw" style="background:#D4AF37"><div class="label" style="color:#1A1A1A">400</div><div class="val" style="color:#1A1A1A">#D4AF37</div></div>
    <div class="sw" style="background:#C9A227; outline:2px solid #F5D77A; outline-offset:2px"><div class="label" style="color:#0A0A0A">500 ●</div><div class="val" style="color:#0A0A0A">#C9A227</div></div>
    <div class="sw" style="background:#B8911E"><div class="label">600</div><div class="val">#B8911E</div></div>
    <div class="sw" style="background:#9A7818"><div class="label">700</div><div class="val">#9A7818</div></div>
  </div>
</body>
</html>
